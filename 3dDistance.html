  <!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemistry Structure Viewer</title>

  <style>
    /* Base resets and typography */
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
    }

    /* Main application wrapper */
    .app-container {
      max-width: 1200px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      padding: 30px;
      box-sizing: border-box;
    }

    header {
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    header h2 {
      margin: 0;
      color: var(--text-main);
    }

    /* Controls Layout */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    /* Forms and Inputs */
    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: "Courier New", Courier, monospace;
      resize: vertical;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    select {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      align-self: flex-start;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    /* Canvas area */
    #bg {
      display: block;
      width: 100%;
      height: 50vh;
      min-height: 400px;
      border-radius: 12px;
      background-color: #1a1a1a; /* Dark background for 3D elements to pop */
      margin: 20px 0;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    /* Results area */
    .results-container {
      background: #f1f5f9;
      border-left: 4px solid var(--primary-color);
      border-radius: 0 8px 8px 0;
      padding: 15px 20px;
      margin-top: 20px;
    }

    .results-container h5 {
      margin: 0 0 10px 0;
      font-size: 1.1rem;
    }

    #results {
      font-family: monospace;
      color: var(--text-muted);
    }

    .slider-container {
      position: relative;
      width: 100%;
      margin-top: 10px;
    }

    /* The floating tooltip bubble */
    .slider-tooltip {
      position: absolute;
      top: -35px; /* Positions it nicely above the track */
      left: 31%;  /* Starts at the default 1.0 position */
      transform: translateX(-50%);
      background-color: var(--text-main);
      color: white;
      padding: 4px 8px;
      font-size: 0.8rem;
      font-weight: bold;
      border-radius: 4px;
      pointer-events: none; /* Prevents the tooltip from blocking clicks */
      opacity: 0;
      transition: opacity 0.15s ease, left 0.05s linear;
    }

    /* Arrow point on the bottom of the tooltip */
    .slider-tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 5px;
      border-style: solid;
      border-color: var(--text-main) transparent transparent transparent;
    }

    /* Reveal tooltip on hover OR when interacting with the slider container */
    .slider-container:hover .slider-tooltip,
    .slider-container:focus-within .slider-tooltip {
      opacity: 1;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .controls-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="app-container">
    <header>
      <h2>3D Structure Viewer</h2>
    </header>

    <div class="controls-grid">
      <div class="input-group">
        <label for="textInput">Text Input</label>
        <textarea id="textInput" placeholder="Paste your coordinate data here..."></textarea>
        <button id="textInputButton">Evaluate Text Input</button>
      </div>

      <div class="input-group">
        <label for="moleculeDropdown">Load Preset Structure (rho=2)</label>
        <select id="moleculeDropdown">
          <option value="">Choose a structure...</option>
        </select>

        <br>

        <label for="sizeSlider">Atom Size</label>
        <div class="slider-container">
          <input type="range" id="sizeSlider" min="0.01" max="5.0" step="0.01" value="1.0">
          <span id="sliderTooltip" class="slider-tooltip">1.0x</span>
        </div>
      </div>
    </div>

    <canvas id="bg"></canvas>

    <div class="results-container">
      <h5>Evaluation Results</h5>
      <div id="results">Awaiting input...</div>
    </div>

  </div>

  <script src="./3dDistance.js" type="module"></script>
</body>
</html>
